<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPOMAN — Flash Kinetic Engine</title>
<meta name="description" content="Stroboscopic kinetic typography engine with BPM-driven scene cuts and geometric distortions.">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Anton&family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'JetBrains Mono',monospace;}
:root{
  --bg:#050505;--bg2:#0a0a0a;--bg3:#111111;--bg4:#1a1a1a;
  --border:#2a2a2a;--border2:#333333;--border3:#444444;
  --text:#f4f4f4;--text2:#aaaaaa;--text3:#777777;
  --accent:#FF2020;--accent2:#FF4040;
}
body{color:var(--text);font-size:11px;background:#000;cursor:crosshair;}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  opacity:0.03;z-index:99999;mix-blend-mode:overlay;}
canvas{display:block !important;}
.panel{position:fixed;top:0;left:0;width:260px;height:100vh;z-index:10;
  background:rgba(5,5,5,0.92);backdrop-filter:blur(12px);
  border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;
  transition:transform 0.25s cubic-bezier(.4,0,.2,1);}
.panel.collapsed{transform:translateX(-260px);}
.panel::-webkit-scrollbar{width:4px;}
.panel::-webkit-scrollbar-thumb{background:var(--border3);}
.panel-toggle{position:fixed;top:12px;z-index:11;
  font-size:18px;background:rgba(5,5,5,0.7);backdrop-filter:blur(8px);
  border:1px solid var(--border2);color:var(--text);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;}
.panel-toggle:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.panel.collapsed ~ .panel-toggle{left:12px;}
.panel:not(.collapsed) ~ .panel-toggle{left:268px;}
.panel-header{padding:16px 14px 12px;border-bottom:1px solid var(--border);}
.panel-title{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:4px;text-transform:uppercase;color:var(--text);}
.panel-title .flash-tag{color:var(--accent);font-size:11px;letter-spacing:2px;margin-left:8px;font-family:'JetBrains Mono',monospace;font-weight:700;}
.panel-sub{font-size:9px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.sh{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
.sh:hover{background:rgba(255,255,255,0.03);}
.sh .ico{font-size:11px;width:14px;text-align:center;color:var(--accent);}
.sh .lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text);flex:1;}
.sh .ar{font-size:10px;color:var(--text);transition:transform 0.15s;font-family:'JetBrains Mono',monospace;}
.sh.open .ar{transform:rotate(90deg);}
.sb{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.sb.hidden{display:none;}
.row{display:flex;align-items:center;gap:8px;}
.row label{font-size:10px;color:var(--text2);flex-shrink:0;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
input[type=range]{flex:1;min-width:0;height:4px;-webkit-appearance:none;appearance:none;
  background:var(--border2);outline:none;cursor:crosshair;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:6px;height:16px;background:var(--accent);cursor:crosshair;border:none;}
.ni{width:42px;font-size:10px;font-weight:700;text-align:right;background:var(--bg3);
  border:1px solid var(--border2);color:var(--text);padding:3px 4px;outline:none;
  font-family:'JetBrains Mono',monospace;}
.radio-row{display:flex;gap:8px;align-items:center;}
.radio-row label{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);cursor:pointer;font-weight:700;text-transform:uppercase;}
.radio-row input[type=radio]{accent-color:var(--accent);cursor:pointer;}
.txt-input{width:100%;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  padding:8px;resize:vertical;min-height:60px;outline:none;text-align:center;}
.txt-input:focus{border-color:var(--accent);}
.font-select{width:100%;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  padding:4px;outline:none;cursor:pointer;text-transform:uppercase;}
.color-row{display:flex;align-items:center;gap:8px;}
.color-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
input[type=color]{width:28px;height:28px;padding:0;border:1px solid var(--border3);background:none;cursor:pointer;}
.chk-row{display:flex;align-items:center;gap:6px;}
.chk-row label{font-size:10px;color:var(--text2);cursor:pointer;font-weight:700;text-transform:uppercase;}
.chk-row input[type=checkbox]{accent-color:var(--accent);cursor:pointer;width:14px;height:14px;}
.scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.scene-chk{display:flex;align-items:center;gap:4px;}
.scene-chk label{font-size:10px;color:var(--text2);cursor:pointer;font-weight:700;text-transform:uppercase;}
.scene-chk input[type=checkbox]{accent-color:var(--accent);cursor:pointer;width:12px;height:12px;}
.scene-chk input:checked + label{color:var(--accent);}
.btn{font-size:10px;padding:6px 10px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);cursor:pointer;transition:background 0.1s;
  font-weight:700;text-transform:uppercase;letter-spacing:1px;width:100%;text-align:center;}
.btn:hover{background:var(--border2);color:var(--text);}
.btn-accent{font-size:10px;padding:6px 10px;border:1px solid var(--accent);
  background:rgba(255,32,32,0.15);color:var(--accent);cursor:pointer;transition:all 0.15s;
  font-weight:800;text-transform:uppercase;letter-spacing:2px;width:100%;text-align:center;}
.btn-accent:hover{background:var(--accent);color:#000;}
.aspect-row{display:flex;gap:8px;}
.aspect-row label{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3);cursor:pointer;font-weight:700;text-transform:uppercase;}
.aspect-row input[type=radio]{accent-color:var(--accent);cursor:pointer;}
.play-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:12px;}
.play-toggle{width:56px;height:28px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:14px;cursor:pointer;position:relative;transition:all 0.25s;}
.play-toggle.on{background:var(--accent);border-color:var(--accent);}
.play-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
  background:#fff;border-radius:50%;transition:transform 0.25s cubic-bezier(.4,0,.2,1);}
.play-toggle.on::after{transform:translateX(28px);}
.play-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text3);user-select:none;}
.back-link{position:fixed;top:12px;right:16px;z-index:20;
  font-size:10px;font-weight:700;color:var(--text3);text-decoration:none;
  text-transform:uppercase;letter-spacing:1px;padding:6px 12px;
  border:1px solid var(--border2);background:rgba(5,5,5,0.7);backdrop-filter:blur(8px);transition:all 0.15s;}
.back-link:hover{color:var(--accent);border-color:var(--accent);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--border3);flex-shrink:0;}
.live-dot.on{background:var(--accent);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>

<div class="panel" id="mainPanel">
  <div class="panel-header">
    <div class="panel-title">TYPOMAN<span class="flash-tag">v.FLASH</span></div>
    <div class="panel-sub">Stroboscopic Kinetic Engine</div>
  </div>
  <div class="sh open" data-sec="text"><span class="ico">T</span><span class="lbl">Text</span><span class="ar">›</span></div>
  <div class="sb" id="sec-text">
    <div class="radio-row">
      <label><input type="radio" name="textMode" value="0" checked> Text</label>
      <label><input type="radio" name="textMode" value="1"> Clock</label>
    </div>
    <div id="textModeUI">
      <textarea class="txt-input" id="textArea" rows="4">THE
COLLECTIVE
POWER
OF
TINY</textarea>
    </div>
    <select class="font-select" id="fontSelect">
      <option value="0">Anton</option>
      <option value="1">Bebas Neue</option>
      <option value="2">Impact</option>
    </select>
    <div class="color-row">
      <div><div class="color-label">BG</div><input type="color" id="bColor" value="#ffffff"></div>
      <div><div class="color-label">FG</div><input type="color" id="fColor" value="#000000"></div>
    </div>
    <div class="chk-row">
      <input type="checkbox" id="colorSwap" checked>
      <label for="colorSwap">Random Color Swap</label>
    </div>
  </div>
  <div class="sh open" data-sec="scenes"><span class="ico">⚡</span><span class="lbl">Scenes</span><span class="ar">›</span></div>
  <div class="sb" id="sec-scenes">
    <div class="radio-row">
      <label><input type="radio" name="accelMode" value="0" checked> MatchCut</label>
      <label><input type="radio" name="accelMode" value="1"> EasyEase</label>
      <div class="live-dot on" id="liveDot"></div>
    </div>
    <div class="row">
      <label>Pace</label>
      <input type="range" id="paceSlider" min="10" max="60" step="1" value="30">
      <span class="ni" id="paceVal">30</span>
    </div>
    <div class="scene-grid" id="sceneGrid">
      <div class="scene-chk"><input type="checkbox" id="sc-arc" data-idx="0" checked><label for="sc-arc">Arc</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-bend" data-idx="1" checked><label for="sc-bend">Bend</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-box" data-idx="2" checked><label for="sc-box">Box</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-bugeye" data-idx="3" checked><label for="sc-bugeye">Bug Eye</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-halo" data-idx="4" checked><label for="sc-halo">Halo</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-sun" data-idx="5" checked><label for="sc-sun">Sun</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-shutter1" data-idx="6" checked><label for="sc-shutter1">Shutter1</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-shutter2" data-idx="7" checked><label for="sc-shutter2">Shutter2</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-slots" data-idx="8" checked><label for="sc-slots">Slots</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-snap" data-idx="9" checked><label for="sc-snap">Snap</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-split" data-idx="10" checked><label for="sc-split">Split</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-star" data-idx="11" checked><label for="sc-star">Star</label></div>
      <div class="scene-chk"><input type="checkbox" id="sc-twist" data-idx="12" checked><label for="sc-twist">Twist</label></div>
    </div>
    <button class="btn" id="clearAll">Clear All</button>
  </div>
  <div class="sh" data-sec="save"><span class="ico">⬇</span><span class="lbl">Save</span><span class="ar">›</span></div>
  <div class="sb hidden" id="sec-save">
    <div class="row">
      <label>Repeat</label>
      <input type="range" id="repeatSlider" min="1" max="10" step="1" value="3">
      <span class="ni" id="repeatVal">3</span>
    </div>
    <div class="aspect-row">
      <label><input type="radio" name="aspect" value="0" checked> Window</label>
      <label><input type="radio" name="aspect" value="1"> 9:16</label>
      <label><input type="radio" name="aspect" value="2"> 1:1</label>
    </div>
    <button class="btn-accent" id="saveLoop">⬇ Save Loop</button>
  </div>
</div>
<button class="panel-toggle" id="panelToggle">☰</button>
<a class="back-link" href="index.html">← Typoman</a>
<div class="play-bar">
  <span class="play-label">Engine</span>
  <div class="play-toggle on" id="playToggle"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// GLOBALS (mirroring STG architecture)
// ═══════════════════════════════════════════════════════════════════
var currentFont;
var bkgdColor, foreColor;
var selector = 0;
var mainFlash;
var sceneLength = 30;
var rampCounter = 0;
var thisFontAdjust = 0.85;
var thisFontAdjustUp = -0.05;
var flashCount = 13;
var sceneOn = [];
var sceneCount = 13;
var keyText, keyArray;
var accelMode = 0;
var displayMode = 0;
var colorSwapOn = true;
const frate = 30;
var coreCounter = 0;
var sHold = 0;
var cwidth, cheight;
var saveMode = 0;
var playing = true;
var tFont = [];

// ═══════════════════════════════════════════════════════════════════
// EASING FUNCTIONS (from animators.js)
// ═══════════════════════════════════════════════════════════════════
function easeOutQuad(t){return 1-(1-t)*(1-t);}
function easeInQuad(t){return t*t;}
function easeInOutQuad(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function easeOutCirc(t){return Math.sqrt(1-Math.pow(t-1,2));}
function easeInCirc(t){return 1-Math.sqrt(1-Math.pow(t,2));}
function easeInOutCirc(t){return t<0.5?(1-Math.sqrt(1-Math.pow(2*t,2)))/2:(Math.sqrt(1-Math.pow(-2*t+2,2))+1)/2;}
function easeOutQuint(t){return 1-Math.pow(1-t,5);}
function easeInQuint(t){return t*t*t*t*t;}

// ═══════════════════════════════════════════════════════════════════
// P5.JS SETUP & DRAW
// ═══════════════════════════════════════════════════════════════════
function preload(){
  tFont[0] = loadFont('https://raw.githubusercontent.com/google/fonts/main/ofl/anton/Anton-Regular.ttf');
  tFont[1] = loadFont('https://raw.githubusercontent.com/google/fonts/main/ofl/bebasneue/BebasNeue-Regular.ttf');
  tFont[2] = loadFont('https://raw.githubusercontent.com/google/fonts/main/ofl/oswald/Oswald%5Bwght%5D.ttf');
}

function setup(){
  createCanvas(windowWidth, windowHeight, WEBGL);
  for(var n=0;n<flashCount;n++) sceneOn[n]=true;
  currentFont = tFont[0];
  bkgdColor = color('#ffffff');
  foreColor = color('#000000');
  frameRate(frate);
  textureMode(NORMAL);
  cwidth=width; cheight=height;
  setText();
}

function draw(){
  if(!playing){background(bkgdColor);return;}
  background(bkgdColor);
  ortho(-width/2,width/2,-height/2,height/2,-10000,10000);
  push();
    translate(-width/2,-height/2);
    if(mainFlash){
      mainFlash.update();
      mainFlash.display();
    }
  pop();

  if(displayMode==0){
    if((coreCounter+1)%sceneLength==0) pickScene();
  } else if(displayMode==1){
    if(sHold!=second()){pickScene();sHold=second();}
  }
  coreCounter++;
}

function windowResized(){resizeCanvas(windowWidth,windowHeight,WEBGL);cwidth=width;cheight=height;}

// ═══════════════════════════════════════════════════════════════════
// SCENE PICKER (from sketch_flash.js)
// ═══════════════════════════════════════════════════════════════════
function setText(){
  var enteredText=document.getElementById("textArea").value;
  keyText=enteredText;
  keyArray=enteredText.match(/[^\r\n]+/g);
  if(keyArray==null) keyArray=[""];
  selector=0;
  pickScene();
}

function pickScene(){
  if(mainFlash!=null) mainFlash.removeGraphics();
  if(selector==keyArray.length) selector=0;
  var currentText=keyArray[selector];
  if(displayMode==1){
    var h=hour(),m=minute(),s=second();
    m=m<10?"0"+m:m; s=s<10?"0"+s:s;
    currentText=h+":"+m+":"+s;
  }

  sceneCount=0;
  for(var n=0;n<flashCount;n++){if(sceneOn[n])sceneCount++;}

  if(sceneCount==0){
    mainFlash=new Blank(rampCounter%2,currentText);
  } else {
    var sceneSelecting=true;
    var rs0=random(flashCount*10);
    var attempts=0;
    while(sceneSelecting && attempts<200){
      attempts++;
      if(rs0<10&&sceneOn[0]){mainFlash=new Arcer(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>10&&rs0<20&&sceneOn[1]){mainFlash=new Bend(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>20&&rs0<30&&sceneOn[2]){mainFlash=new Box(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>30&&rs0<40&&sceneOn[3]){
        if(accelMode==0) mainFlash=new BugEyes(rampCounter%2,currentText);
        else mainFlash=new BugEyesEE(rampCounter%2,currentText);
        sceneSelecting=false;
      }
      else if(rs0>40&&rs0<50&&sceneOn[4]){mainFlash=new Halo(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>50&&rs0<60&&sceneOn[5]){mainFlash=new RiseSun(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>60&&rs0<70&&sceneOn[6]){
        if(accelMode==0) mainFlash=new Shutters(rampCounter%2,currentText);
        else mainFlash=new ShuttersEE(rampCounter%2,currentText);
        sceneSelecting=false;
      }
      else if(rs0>70&&rs0<80&&sceneOn[7]){mainFlash=new Shutters2(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>80&&rs0<90&&sceneOn[8]){mainFlash=new SlotMachine(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>90&&rs0<100&&sceneOn[9]){mainFlash=new Snap(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>100&&rs0<110&&sceneOn[10]){mainFlash=new Split(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>110&&rs0<120&&sceneOn[11]){mainFlash=new Starburst(rampCounter%2,currentText);sceneSelecting=false;}
      else if(rs0>120&&rs0<=130&&sceneOn[12]){mainFlash=new Twist(rampCounter%2,currentText);sceneSelecting=false;}
      else {rs0=random(flashCount*10);}
    }
    if(sceneSelecting) mainFlash=new Blank(rampCounter%2,currentText);
  }

  if(colorSwapOn&&random(10)<3){
    var cA=rgbToHex(foreColor.levels[0],foreColor.levels[1],foreColor.levels[2]);
    var cB=rgbToHex(bkgdColor.levels[0],bkgdColor.levels[1],bkgdColor.levels[2]);
    foreColor=color(cB); bkgdColor=color(cA);
    document.getElementById('bColor').value=cA;
    document.getElementById('fColor').value=cB;
  }
  rampCounter++; selector++;
}

function rgbToHex(r,g,b){return "#"+(1<<24|r<<16|g<<8|b).toString(16).slice(1);}
function checkTime(i){if(i<10){i="0"+i;}return i;}

// ═══════════════════════════════════════════════════════════════════
// SCENE CLASSES (faithfully ported from STG source)
// ═══════════════════════════════════════════════════════════════════

// --- BLANK ---
class Blank{
  constructor(r,inp){this.inp=inp;this.pgTextSize=2;this.findTextSize();}
  update(){}
  display(){
    background(bkgdColor);
    fill(foreColor);noStroke();
    textFont(currentFont);textSize(this.pgTextSize);textAlign(CENTER);
    text(this.inp,width/2,height/2+this.pgTextSize*thisFontAdjust/2);
  }
  findTextSize(){var m=0;while(m<width){textSize(this.pgTextSize);textFont(currentFont);m=textWidth(this.inp);this.pgTextSize+=2;}
    if(this.pgTextSize*thisFontAdjust>height*7/8)this.pgTextSize=(height*7/8)/thisFontAdjust;}
  removeGraphics(){}
}

// --- ARCER ---
class Arcer{
  constructor(ramp_,inp_){this.inp=inp_;this.pgTextSize=2;this.findTextSize();this.xSpots=[];this.findXpos();
    this.yAnim=[];this.yTarget=[];this.yStart=50;this.yMin=0;this.yMax=-150;this.setYtarget();this.ticker=0;this.ramp=ramp_;}
  update(){this.ticker++;var tk0=map(this.ticker,0,sceneLength,0,1);
    for(var n=0;n<this.inp.length;n++){var tk1;
      if(accelMode==0){if(this.ramp==0)tk1=easeOutCirc(tk0);else tk1=easeInCirc(tk0);this.yAnim[n]=map(tk1,0,1,this.yStart,this.yTarget[n]);}
      else{let a,b;if(tk0<0.5){var tk0b=map(tk0,0,0.5,0,1);tk1=easeOutCirc(tk0b);a=this.yStart;b=this.yTarget[n]/2;}
        else{var tk0b=map(tk0,0.5,1,0,1);tk1=easeInCirc(tk0b);a=this.yTarget[n]/2;b=this.yTarget[n];}this.yAnim[n]=map(tk1,0,1,a,b);}}}
  display(){background(bkgdColor);push();translate(0,(this.pgTextSize*thisFontAdjust)/2);textSize(this.pgTextSize);textAlign(LEFT);fill(foreColor);noStroke();
    for(var n=0;n<this.inp.length;n++){push();translate(this.xSpots[n],height/2);translate(0,this.yAnim[n]);text(this.inp.charAt(n),0,0);pop();}pop();}

    if(this.pgTextSize*thisFontAdjust>height*7/8)this.pgTextSize=(height*7/8)/thisFontAdjust;}
  makeTextures(){textSize(this.pgTextSize);textFont(currentFont);for(var n=0;n<this.inp.length;n++){var rs=round(textWidth(this.inp.charAt(n)));
    this.pg[n]=createGraphics(rs,this.pgTextSize*(thisFontAdjust+0.05));this.pg[n].background(bkgdColor);this.pg[n].fill(foreColor);this.pg[n].noStroke();
    this.pg[n].textSize(this.pgTextSize);this.pg[n].textAlign(CENTER);this.pg[n].textFont(currentFont);
    var adj=this.pg[n].height/2+this.pgTextSize*thisFontAdjust/2+this.pgTextSize*thisFontAdjustUp;this.pg[n].text(this.inp.charAt(n),this.pg[n].width/2,adj);}}
  removeGraphics(){for(var n=0;n<this.inp.length;n++)this.pg[n].remove();}
}

// --- SLOTMACHINE ---
class SlotMachine{
  constructor(ramp_,inp_){this.inp=inp_;this.repeats=2;this.pgTextSize=2;this.findTextSize();this.xSpots=[];this.findXpos();
    this.yAnim=[];this.yTarget=[];this.yStart=50;this.setYtarget();this.ticker=0;this.ramp=ramp_;}
  update(){this.ticker++;var tk0=map(this.ticker,0,sceneLength,0,1);for(var n=0;n<this.inp.length;n++){var tk1;var a0,b0;
    if(accelMode==0){if(this.ramp==0)tk1=easeOutCirc(tk0);else tk1=easeInCirc(tk0);a0=this.yStart;b0=this.yTarget[n];}
    else{if(tk0<0.5){var tk0b=map(tk0,0,0.5,0,1);tk1=easeOutCirc(tk0b);a0=this.yStart;b0=(this.yStart+this.yTarget[n])/2;}
      else{var tk0b=map(tk0,0.5,1,0,1);tk1=easeInCirc(tk0b);a0=(this.yStart+this.yTarget[n])/2;b0=this.yTarget[n];}}
    this.yAnim[n]=map(tk1,0,1,a0,b0);}}
  display(){background(bkgdColor);push();translate(0,(this.pgTextSize*thisFontAdjust)/2);textSize(this.pgTextSize);textAlign(LEFT);fill(foreColor);noStroke();
    for(var n=0;n<this.inp.length;n++){push();translate(this.xSpots[n],height/2);translate(0,this.yAnim[n]);translate(0,-this.repeats*(this.pgTextSize*0.8)/2);
      for(var p=0;p<this.repeats;p++){text(this.inp.charAt(n),0,p*this.pgTextSize*0.8);}pop();}pop();}
  findXpos(){textFont(currentFont);textSize(this.pgTextSize);var fs=textWidth(this.inp);var xs=width/2-fs/2;
    for(var n=0;n<this.inp.length;n++){var lw=textWidth(this.inp.charAt(n));var uw=textWidth(this.inp.slice(0,n+1));this.xSpots[n]=xs+uw-lw;}}
  setYtarget(){for(var n=0;n<this.inp.length;n++){this.yTarget[n]=random(-this.pgTextSize*2,this.pgTextSize*2);}}
  findTextSize(){var m=0;while(m<width){textSize(this.pgTextSize);textFont(currentFont);m=textWidth(this.inp);this.pgTextSize+=2;}
    if(this.pgTextSize*thisFontAdjust>height*7/8)this.pgTextSize=(height*7/8)/thisFontAdjust;this.repeats=round((height*2)/this.pgTextSize)+5;}
  removeGraphics(){}
}

// --- SNAP ---
class Snap{
  constructor(ramp_,inp_){this.inp=inp_;this.pgTextSize=2;this.findTextSize();this.xKern=[];this.xWidths=[];this.xScaleMax=0.2;this.xScale=[];
    this.xShear=[];this.xShearMax=-PI/8;this.findSpacing();this.ticker=0;this.ramp=ramp_;this.pacer=(sceneLength/1.5)/this.inp.length;}
  update(){this.ticker++;for(var n=0;n<this.inp.length;n++){var tk00=constrain(this.ticker-n*this.pacer,0,sceneLength);var tk0=map(tk00,0,sceneLength,0,1);var tk1;var a0,b0,a1,b1;
    if(accelMode==0){if(this.ramp==0)tk1=easeOutQuad(tk0);else tk1=easeInQuad(tk0);a0=this.xScaleMax;b0=1;a1=this.xShearMax;b1=0;}
    else{if(tk0<0.5){var tk0b=map(tk0,0,0.5,0,1);tk1=easeOutCirc(tk0b);a0=this.xScaleMax;b0=(this.xScaleMax+1)/2;a1=this.xShearMax;b1=this.xShearMax/2;}
      else{var tk0b=map(tk0,0.5,1,0,1);tk1=easeInCirc(tk0b);a0=(this.xScaleMax+1)/2;b0=1;a1=this.xShearMax/2;b1=0;}}
    this.xScale[n]=map(tk1,0,1,a0,b0);this.xShear[n]=map(tk1,0,1,a1,b1);this.xWidths[n]=textWidth(this.inp.charAt(n))*this.xScale[n];}
    var fs=0;for(var n=0;n<this.inp.length-1;n++){this.xKern[n]=this.xWidths[n]/2+this.xWidths[n+1]/2;fs+=this.xKern[n];}
    this.xKern[this.inp.length-1]=0;this.xStart=-fs/2;}
  display(){background(bkgdColor);fill(foreColor);noStroke();push();translate(width/2,height/2);translate(this.xStart,0);translate(0,this.pgTextSize*thisFontAdjust/2);
    textFont(currentFont);textSize(this.pgTextSize);textAlign(CENTER);for(var n=0;n<this.inp.length;n++){push();fill(foreColor);noStroke();
      shearX(this.xShear[n]);scale(this.xScale[n],1);text(this.inp.charAt(n),0,0);pop();translate(this.xKern[n],0);}pop();}
  findSpacing(){textFont(currentFont);textSize(this.pgTextSize);for(var n=0;n<this.inp.length;n++)this.xWidths[n]=textWidth(this.inp.charAt(n));
    var fs=0;for(var n=0;n<this.inp.length-1;n++){this.xKern[n]=this.xWidths[n]/2+this.xWidths[n+1]/2;fs+=this.xKern[n];}
    this.xKern[this.inp.length-1]=0;this.xStart=-fs/2;}
  findTextSize(){var m=0;while(m<width){textSize(this.pgTextSize);textFont(currentFont);m=textWidth(this.inp);this.pgTextSize+=2;}
    if(this.pgTextSize*thisFontAdjust>height*7/8)this.pgTextSize=(height*7/8)/thisFontAdjust;}
  removeGraphics(){}
}

// --- SPLIT ---
class Split{
  constructor(ramp_,inp_){this.inp=inp_;this.pgTextSize=2;this.findTextSize();this.drawTextures();this.direction=random(10)<5?-1:1;this.ticker=0;this.ramp=ramp_;
    this.animShear=0;this.animShearMax=this.direction*PI/8;this.splitR=[0];this.splitR[1]=this.splitR[0]+random(0.1,0.4);
    this.splitR[2]=this.splitR[1]+random(0.1,0.6);this.splitR[3]=1;this.animX=[];this.animXmax=[];
    this.animXmax[0]=this.direction*-100;this.animXmax[1]=this.direction*50;this.animXmax[2]=this.direction*25;}
  update(){this.ticker++;var tk0=map(this.ticker,0,sceneLength,0,1);var tk1;
    if(accelMode==0){if(this.ramp==0)tk1=easeOutCirc(tk0);else tk1=easeInCirc(tk0);this.animShear=map(tk1,0,1,0,this.animShearMax);
      for(var m=0;m<3;m++)this.animX[m]=map(tk1,0,1,0,this.animXmax[m]);}
    else{let a,b;if(tk0<0.5){var tk0b=map(tk0,0,0.5,0,1);tk1=easeOutCirc(tk0b);a=0;b=this.animShearMax/2;}
      else{var tk0b=map(tk0,0.5,1,0,1);tk1=easeInCirc(tk0b);a=this.animShearMax/2;b=this.animShearMax;}this.animShear=map(tk1,0,1,a,b);
      for(var m=0;m<3;m++){let a2,b2;if(tk0<0.5){var tk0b2=map(tk0,0,0.5,0,1);tk1=easeOutCirc(tk0b2);a2=0;b2=this.animXmax[m]/2;}
        else{var tk0b2=map(tk0,0.5,1,0,1);tk1=easeInCirc(tk0b2);a2=this.animXmax[m]/2;b2=this.animXmax[m];}this.animX[m]=map(tk1,0,1,a2,b2);}}}
  display(){background(bkgdColor);push();translate(width/2,height/2);scale(0.75);shearX(this.animShear);translate(-this.pgA.width/2,-this.pgA.height/2);texture(this.pgA);
    for(var m=0;m<3;m++){translate(this.animX[m],0);beginShape(TRIANGLE_STRIP);
      vertex(0,this.pgA.height*this.splitR[m],0,this.splitR[m]);vertex(0,this.pgA.height*this.splitR[m+1],0,this.splitR[m+1]);
      vertex(this.pgA.width,this.pgA.height*this.splitR[m],1,this.splitR[m]);vertex(this.pgA.width,this.pgA.height*this.splitR[m+1],1,this.splitR[m+1]);endShape();}pop();}
  findTextSize(){var m=0;while(m<width){textSize(this.pgTextSize);textFont(currentFont);m=textWidth(this.inp);this.pgTextSize+=2;}
    if(this.pgTextSize*thisFontAdjust>height*7/8)this.pgTextSize=(height*7/8)/thisFontAdjust;}
  drawTextures(){textSize(this.pgTextSize);textFont(currentFont);var rs=round(textWidth(this.inp));
    this.pgA=createGraphics(rs,this.pgTextSize*(thisFontAdjust+0.05));this.pgA.background(bkgdColor);this.pgA.fill(foreColor);this.pgA.noStroke();
    this.pgA.textSize(this.pgTextSize);this.pgA.textAlign(CENTER);this.pgA.textFont(currentFont);
    var adj=this.pgA.height/2+this.pgTextSize*thisFontAdjust/2+this.pgTextSize*thisFontAdjustUp;this.pgA.text(this.inp,this.pgA.width/2,adj);}
  removeGraphics(){this.pgA.remove();}
}

// --- STARBURST ---
class Starburst{
  constructor(ramp_,inp_){this.inp=inp_;this.pgTextSize=2;this.findTextSize();this.drawTextures();this.res=round(random(2,10))*4;this.ang=2*PI/this.res;
    this.radiusMinX=0;this.radiusMaxX=width/2;this.radiusMinY=0;this.radiusMaxY=height/2;this.radiusXinner=width/8;this.radiusYinner=height/8;
    this.xCenter=width/2;this.yMin=height*3/4;this.yMax=height/2;this.rotZmax=random(-PI,PI);this.ticker=0;this.ramp=ramp_;}
  update(){this.ticker++;var tk0=map(this.ticker,0,sceneLength,0,1);var tk1;var a0,b0,a1,b1,a2,b2,a3,b3;
    if(accelMode==0){if(this.ramp==0)tk1=easeOutCirc(tk0);else tk1=easeInCirc(tk0);
      a0=this.radiusMinX;b0=this.radiusMaxX;a1=this.radiusMinY;b1=this.radiusMaxY;a2=0;b2=this.rotZmax;a3=this.yMin;b3=this.yMax;}
    else{if(tk0<0.5){var tk0b=map(tk0,0,0.5,0,1);tk1=easeOutCirc(tk0b);a0=this.radiusMinX;b0=(this.radiusMinX+this.radiusMaxX)/2;
        a1=this.radiusMinY;b1=(this.radiusMinY+this.radiusMaxY)/2;a2=0;b2=this.rotZmax/2;a3=this.yMin;b3=(this.yMin+this.yMax)/2;}
      else{var tk0b=map(tk0,0.5,1,0,1);tk1=easeInCirc(tk0b);a0=(this.radiusMinX+this.radiusMaxX)/2;b0=this.radiusMaxX;
        a1=(this.radiusMinY+this.radiusMaxY)/2;b1=this.radiusMaxY;a2=this.rotZmax/2;b2=this.rotZmax;a3=(this.yMin+this.yMax)/2;b3=this.yMax;}}
    this.radiusX=map(tk1,0,1,a0,b0);this.radiusY=map(tk1,0,1,a1,b1);this.rotZ=map(tk1,0,1,a2,b2);this.yCenter=map(tk1,0,1,a3,b3);}
  display(){image(this.pgA,0,0);texture(this.pgB);
    beginShape(TRIANGLE_FAN);vertex(this.xCenter,this.yCenter,0.5,0.5);for(var n=0;n<=this.res;n++){var nowRX=this.radiusXinner;var nowRY=this.radiusYinner;
      if(n%2==0){nowRX=this.radiusX;nowRY=this.radiusY;}var x=this.xCenter+cos(n*this.ang+this.rotZ)*nowRX;var y=this.yCenter+sin(n*this.ang+this.rotZ)*nowRY;
      var u=map(x,0,width,0,1);var v=map(y,0,height,0,1);vertex(x,y,u,v);}endShape();}
  findTextSize(){var m=0;while(m<width){textSize(this.pgTextSize);textFont(currentFont);m=textWidth(this.inp);this.pgTextSize+=2;}
    if(this.pgTextSize*thisFontAdjust>height*7/8)this.pgTextSize=(height*7/8)/thisFontAdjust;}
  drawTextures(){this.pgA=createGraphics(width,height);this.pgA.background(foreColor);this.pgA.noStroke();this.pgA.fill(bkgdColor);this.pgA.textFont(currentFont);this.pgA.textAlign(CENTER);this.pgA.textSize(this.pgTextSize);
    var adj=this.pgA.height/2+this.pgTextSize*thisFontAdjust/2+this.pgTextSize*thisFontAdjustUp;this.pgA.translate(width/2,adj);this.pgA.text(this.inp,0,0);
    this.pgB=createGraphics(width,height);this.pgB.background(bkgdColor);this.pgB.noStroke();this.pgB.fill(foreColor);this.pgB.textFont(currentFont);this.pgB.textAlign(CENTER);this.pgB.textSize(this.pgTextSize);
    adj=this.pgA.height/2+this.pgTextSize*thisFontAdjust/2+this.pgTextSize*thisFontAdjustUp;this.pgB.translate(width/2,adj);this.pgB.text(this.inp,0,0);}
  removeGraphics(){this.pgA.remove();this.pgB.remove();}
}

// --- TWIST ---
class Twist{
  constructor(ramp_,inp_){this.inp=inp_;this.pgTextSize=2;this.findTextSize();this.drawTextures();this.ticker=0;this.ramp=ramp_;
    this.yOutside=(height-this.pgA.height)/2;this.d=random(10)<5?-1:1;this.res=300;
    this.tl=createVector(0,0);this.bl=createVector(0,this.pgA.height);this.tml=createVector(this.pgA.width/3,0);this.bml=createVector(this.pgA.width/3,this.pgA.height);
    this.tmr=createVector(this.pgA.width*2/3,0);this.bmr=createVector(this.pgA.width*2/3,this.pgA.height);this.tr=createVector(this.pgA.width,0);this.br=createVector(this.pgA.width,this.pgA.height);}
  update(){this.ticker++;var tk0=map(this.ticker,0,sceneLength,0,1);var tk1;var a0,b0,a1,b1;
    if(accelMode==0){if(this.ramp==0)tk1=easeOutCirc(tk0);else tk1=easeInCirc(tk0);
      if(this.d==1){a0=0;b0=-this.yOutside;a1=this.pgA.height;b1=this.pgA.height+this.yOutside;}
      else{a0=this.pgA.height;b0=this.pgA.height+this.yOutside;a1=0;b1=this.d*this.yOutside;}}
    else{if(tk0<0.5){var tk0b=map(tk0,0,0.5,0,1);tk1=easeOutCirc(tk0b);if(this.d==1){a0=0;b0=-this.yOutside/2;a1=this.pgA.height;b1=this.pgA.height+this.yOutside/2;}
        else{a0=this.pgA.height;b0=this.pgA.height+this.yOutside/2;a1=0;b1=(this.d*this.yOutside)/2;}}
      else{var tk0b=map(tk0,0.5,1,0,1);tk1=easeInCirc(tk0b);if(this.d==1){a0=-this.yOutside/2;b0=-this.yOutside;a1=this.pgA.height+this.yOutside/2;b1=this.pgA.height+this.yOutside;}
        else{a0=this.pgA.height+this.yOutside/2;b0=this.pgA.height+this.yOutside;a1=(this.d*this.yOutside)/2;b1=this.d*this.yOutside;}}}
    if(this.d==1){this.tl.y=map(tk1,0,1,a0,b0);this.tml.y=this.tl.y;this.bmr.y=map(tk1,0,1,a1,b1);this.br.y=this.bmr.y;}
    else{this.bl.y=map(tk1,0,1,a0,b0);this.bml.y=this.bl.y;this.tmr.y=map(tk1,0,1,a1,b1);this.tr.y=this.tmr.y;}}
  display(){background(bkgdColor);push();translate(width/2,height/2);translate(-this.pgA.width/2,-this.pgA.height/2);texture(this.pgA);noStroke();
    beginShape(TRIANGLE_STRIP);for(var n=0;n<=this.res;n++){let t=n/this.res;
      let xTop=bezierPoint(this.tl.x,this.tml.x,this.tmr.x,this.tr.x,t);let yTop=bezierPoint(this.tl.y,this.tml.y,this.tmr.y,this.tr.y,t);
      let xBot=bezierPoint(this.bl.x,this.bml.x,this.bmr.x,this.br.x,t);let yBot=bezierPoint(this.bl.y,this.bml.y,this.bmr.y,this.br.y,t);
      var u=map(xTop,0,this.pgA.width,0,1);vertex(xTop,yTop,u,0);vertex(xBot,yBot,u,1);}endShape();pop();}
  findTextSize(){var m=0;while(m<width){textSize(this.pgTextSize);textFont(currentFont);m=textWidth(this.inp);this.pgTextSize+=2;}
    if(this.pgTextSize*thisFontAdjust>height*7/8)this.pgTextSize=(height*7/8)/thisFontAdjust;}
  drawTextures(){textSize(this.pgTextSize);textFont(currentFont);var rs=round(textWidth(this.inp));
    this.pgA=createGraphics(rs,this.pgTextSize*(thisFontAdjust+0.05));this.pgA.background(bkgdColor);this.pgA.fill(foreColor);this.pgA.noStroke();
    this.pgA.textSize(this.pgTextSize);this.pgA.textAlign(CENTER);this.pgA.textFont(currentFont);
    var adj=this.pgA.height/2+this.pgTextSize*thisFontAdjust/2+this.pgTextSize*thisFontAdjustUp;this.pgA.text(this.inp,this.pgA.width/2,adj);}
  removeGraphics(){this.pgA.remove();}
}

document.querySelectorAll('.sh').forEach(h=>{h.addEventListener('click',()=>{const b=document.getElementById('sec-'+h.dataset.sec);const o=h.classList.toggle('open');b.classList.toggle('hidden',!o);});});

document.getElementById('playToggle').addEventListener('click',function(){playing=!playing;this.classList.toggle('on',playing);document.getElementById('liveDot').classList.toggle('on',playing);});
document.querySelectorAll('input[name="textMode"]').forEach(r=>{r.addEventListener('change',()=>{displayMode=parseInt(r.value);
  if(displayMode==0){document.getElementById('textModeUI').style.display='block';}else{document.getElementById('textModeUI').style.display='none';sceneLength=floor(frate)+2;}pickScene();});});

document.getElementById('fontSelect').addEventListener('change',e=>{var v=parseInt(e.target.value);if(tFont[v])currentFont=tFont[v];
  if(v==0){thisFontAdjust=0.85;thisFontAdjustUp=-0.05;}else if(v==1){thisFontAdjust=0.7;thisFontAdjustUp=0;}else{thisFontAdjust=0.75;thisFontAdjustUp=0;}});

document.querySelectorAll('.scene-chk input').forEach(el=>{el.addEventListener('change',()=>{var idx=parseInt(el.dataset.idx);sceneOn[idx]=el.checked;
  sceneCount=0;for(var n=0;n<flashCount;n++){if(sceneOn[n])sceneCount++;}});});

document.getElementById('saveLoop').addEventListener('click',()=>{var btn=document.getElementById('saveLoop');btn.textContent='⏺ Recording...';btn.style.pointerEvents='none';
  var cnv=document.querySelector('canvas');var stream=cnv.captureStream(30);var recorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:8000000});
  var chunks=[];recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  recorder.onstop=()=>{var blob=new Blob(chunks,{type:'video/webm'});var a=document.createElement('a');a.download='typoman-flash.webm';a.href=URL.createObjectURL(blob);a.click();
    btn.textContent='⬇ Save Loop';btn.style.pointerEvents='';};
  recorder.start();var sc=0;for(var n=0;n<flashCount;n++){if(sceneOn[n])sc++;}var rpt=parseInt(document.getElementById('repeatSlider').value);
  var dur=Math.max(sceneLength/frate*sc*rpt,2)*1000;setTimeout(()=>recorder.stop(),Math.min(dur,30000));});
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.code==='Space'){e.preventDefault();document.getElementById('playToggle').click();}});
